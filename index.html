<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البتول للزي الشرعي</title>
    <link rel="icon" type="image/png" href="image/logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="eidGreeting" class="eid-canvas-container">
        <div class="eid-text-wrapper">
            <h1 class="eid-main-text">عيد فطر سعيد</h1>
            <p class="eid-sub-text">كل عام وأنتم بخير من متجر البتول ✨</p>
        </div>
    </div>

    <header class="hero">
        <video autoplay muted loop id="mainVideo">
            <source src="video/main-intro.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay">
            <div class="main-branding">
                <h1>البتول للزي الشرعي</h1>
                <p class="address">📍 رام الله _ شارع الارسال _ عمارة الستي مول _ الطابق الاول</p>
            </div>
            <div class="floating-bubble">
                مرحباً بكِ! يمكنكِ التسوق من الموقع <br> أو تشريفنا بزيارة محلنا ✨
            </div>
        </div>
    </header>

    <section class="social-links">
        <div class="social-card" onclick="window.open('https://www.facebook.com/profile.php?id=61575629854203&locale=ar_AR')">
            <img src="image/فيس.svg" alt="Facebook">
            <span>@albatoul_store</span>
        </div>
        <div class="social-card" onclick="window.open('https://www.instagram.com/al_batool2025?igsh=d3lyeWhwNWRhanp1')">
            <img src="image/انستا.png" alt="Instagram">
            <span>@albatoul_store</span>
        </div>
    </section>

    <section class="gallery">
        <h2 class="section-title">أحدث الموديلات</h2>
        <div class="product-grid" id="mainGrid"></div>
    </section>

    <div id="productPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn" onclick="closeProduct()">&times;</span>
            <div class="popup-flex">
                <div class="slider-area">
                    <div id="slides"></div>
                    <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
                    <button class="next" onclick="changeSlide(1)">&#10095;</button>
                    <div id="counter" class="counter">1 / 1</div>
                </div>
                <div class="info-area">
                    <h2 id="pTitle">اسم الموديل</h2>
                    <p id="pPrice" class="price"></p>
                    <div class="selection-group">
                        <label>المقاسات المتوفرة:</label>
                        <div id="sizeOptions" class="options-row"></div>
                    </div>
                    <p id="pDesc" class="desc"></p>
                    <button class="order-btn" onclick="orderWhatsApp()">اطلب الآن عبر واتساب</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
